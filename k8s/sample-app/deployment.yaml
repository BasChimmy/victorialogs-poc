apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
    spec:
      containers:
        - name: sample-app
          image: busybox
          command:
            - /bin/sh
            - -c
            - |
              LEVELS="info info info warn error debug"
              MESSAGES="request_received user_login cache_miss slow_query panic_detected config_loaded"
              i=0
              while true; do
                LEVEL=$(echo $LEVELS | tr ' ' '\n' | sed -n "$((i % 6 + 1))p")
                MSG=$(echo $MESSAGES | tr ' ' '\n' | sed -n "$((i % 6 + 1))p")
                echo "{\"level\":\"$LEVEL\",\"msg\":\"$MSG from pod $HOSTNAME\",\"time\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\",\"app\":\"sample-app\"}";
                i=$((i + 1))
                sleep 3;
              done
